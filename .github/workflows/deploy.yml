name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/securesync

jobs:

  # ──────────────────────────────────────────────
  # BUILD & PUSH DOCKER IMAGES
  # ──────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      platform_tag: ${{ steps.meta-platform.outputs.tags }}
      frontend_tag: ${{ steps.meta-frontend.outputs.tags }}
      sha: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Platform API image
      - name: Docker metadata (platform)
        id: meta-platform
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-platform
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push platform image
        uses: docker/build-push-action@v5
        with:
          context: ./platform
          push: true
          tags: ${{ steps.meta-platform.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend image
      - name: Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          build-args: |
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # DEPLOY TO PRODUCTION SERVER
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd /opt/securesync

            echo "→ Pulling latest images..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images
            docker pull ${{ env.IMAGE_PREFIX }}-platform:latest
            docker pull ${{ env.IMAGE_PREFIX }}-frontend:latest

            echo "→ Running database migrations..."
            docker compose run --rm platform alembic upgrade head

            echo "→ Restarting services..."
            docker compose up -d --no-deps --force-recreate platform celery-worker celery-beat frontend

            echo "→ Health check..."
            sleep 15
            curl -f http://localhost:8000/health || (echo "Health check failed!" && exit 1)

            echo "→ Cleaning up old images..."
            docker image prune -f

            echo "✓ Deployment complete — SHA: ${{ github.sha }}"

      - name: Notify on success
        if: success()
        run: |
          echo "Deployment successful: ${{ github.sha }}"
          # Add Teams/Slack webhook here if desired

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment FAILED: ${{ github.sha }}"
          # Add Teams/Slack webhook here if desired
