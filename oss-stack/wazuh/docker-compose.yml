# ============================================================
# Wazuh Single-Node Stack — SecureSync OSS
# ============================================================
#
# Brings up the Wazuh Manager, Indexer (OpenSearch), and Dashboard in the
# single-node configuration. Agents connect on TCP 1514 (reporting) and
# 1515 (enrollment). The REST API (55000) is what SecureSync polls.
#
# Reference: https://github.com/wazuh/wazuh-docker/tree/v4.8.0/single-node
#
# Bring up:
#   cd oss-stack/wazuh
#   docker compose up -d
#
# Credentials (CHANGE before production):
#   API user:  ${WAZUH_USERNAME}   default: wazuh-wui
#   API pass:  ${WAZUH_PASSWORD}   default: MyS3cr37P450r.*-
# ============================================================

networks:
  scanner-net:
    external: true
    name: securesync_scanner-net

volumes:
  wazuh_api_config:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_etc:
  filebeat_var:
  wazuh_indexer_data:
  wazuh_dashboard_config:
  wazuh_dashboard_custom:

services:

  # ── Wazuh Manager (main server + REST API on 55000) ─────────
  wazuh.manager:
    image: wazuh/wazuh-manager:4.8.0
    hostname: wazuh.manager
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    ports:
      # Agent comms (expose on host for agents in customer networks).
      - "1514:1514"                      # reporting
      - "1514:1514/udp"
      - "1515:1515"                      # enrollment
      - "514:514/udp"                    # syslog fan-in
      # REST API — scope to localhost on production; cross-container traffic
      # goes over the scanner-net network.
      - "55000:55000"
    environment:
      INDEXER_URL: "https://wazuh.indexer:9200"
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD:?set WAZUH_INDEXER_PASSWORD in your .env}
      FILEBEAT_SSL_VERIFICATION_MODE: full
      SSL_CERTIFICATE_AUTHORITIES: /etc/ssl/root-ca.pem
      SSL_CERTIFICATE: /etc/ssl/filebeat.pem
      SSL_KEY: /etc/ssl/filebeat.key
      API_USERNAME: ${WAZUH_USERNAME:-wazuh-wui}
      API_PASSWORD: ${WAZUH_PASSWORD:?set WAZUH_PASSWORD in your .env}
    volumes:
      - wazuh_api_config:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
    networks:
      - scanner-net

  # ── Wazuh Indexer (OpenSearch) ──────────────────────────────
  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.8.0
    hostname: wazuh.indexer
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
    networks:
      - scanner-net

  # ── Wazuh Dashboard (web UI — optional) ─────────────────────
  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.8.0
    hostname: wazuh.dashboard
    restart: unless-stopped
    depends_on:
      - wazuh.indexer
    environment:
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD:?set WAZUH_INDEXER_PASSWORD in your .env}
      WAZUH_API_URL: "https://wazuh.manager"
      DASHBOARD_USERNAME: kibanaserver
      DASHBOARD_PASSWORD: ${WAZUH_DASHBOARD_PASSWORD:?set WAZUH_DASHBOARD_PASSWORD in your .env}
    volumes:
      - wazuh_dashboard_config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh_dashboard_custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    ports:
      - "5443:5601"
    networks:
      - scanner-net
